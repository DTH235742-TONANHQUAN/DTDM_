<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Esport - Trang thông tin Thể thao điện tử</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <h2 style="color: #fff; border-left: 4px solid #5d4369; padding-left: 10px; margin-bottom: 20px; font-size: 1.5rem; text-transform: uppercase;">Latest Esports News</h2>
        <div id="heroBannerContainer"></div>

        <div style="text-align: center; margin-bottom: 25px;">
            <input type="text" id="homeSearchInput" placeholder="🔍 Nhập tên bài viết để tìm kiếm..." 
                   style="width: 100%; max-width: 600px; padding: 12px 25px; border-radius: 30px; border: 2px solid #333; background-color: #1a1e24; color: white; outline: none; font-size: 1.05rem;">
        </div>

        <div class="filter-container" id="filter-buttons" style="margin-bottom: 40px;">
            <button class="filter-btn active" data-category="Tất cả">Tất cả</button>
            <button class="filter-btn" data-category="LOL">LOL</button>
            <button class="filter-btn" data-category="TFT">TFT</button>
            <button class="filter-btn" data-category="CS2">CS:GO 2</button>
            <button class="filter-btn" data-category="Valorant">Valorant</button>
            <button class="filter-btn" data-category="PUBG">PUBG</button>
        </div>

        <div class="main-layout">
            <main class="left-column">
                <div id="news-container"></div>
                
                <div id="loadMoreContainer" style="text-align: center; margin-top: 40px;">
                    <button onclick="window.location.href='tintuc.html'" class="load-more-btn">
                        ⬇️ XEM TẤT CẢ TIN TỨC
                    </button>
                </div>
            </main>

            <aside class="right-column">
                <div class="widget">
                    <div class="widget-header"><h3>MOST READ</h3><div class="line"></div></div>
                    <ul class="most-read-list" id="mostReadList"></ul>
                </div>
            </aside>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>
</html>
