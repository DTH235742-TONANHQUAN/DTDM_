<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Trang Tin E-Sport</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f1923; color: #ece8e1; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .auth-container { background-color: #1f2326; padding: 40px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 100%; max-width: 400px; text-align: center; }
        .auth-container h2 { color: #fff; margin-bottom: 25px; font-size: 2rem; text-transform: uppercase; }
        .auth-container h2 span { color: #5d4369; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #aaa; font-weight: bold; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; background-color: #0f1923; border: 1px solid #333; color: white; border-radius: 4px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #5d4369; box-shadow: 0 0 8px rgba(93, 67, 105, 0.5); }
        
        .submit-btn { width: 100%; padding: 12px; background-color: #5d4369; color: white; border: none; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #4a3554; box-shadow: 0 0 15px rgba(93, 67, 105, 0.6); }
        
        .switch-page { margin-top: 20px; font-size: 0.9rem; color: #888; }
        .switch-page a { color: #5d4369; text-decoration: none; font-weight: bold; }
        .switch-page a:hover { color: #fff; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Đăng <span>Ký</span></h2>
        <form id="registerForm">
            <div class="input-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" required placeholder="Nhập tên tài khoản...">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="Nhập địa chỉ email...">
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" required placeholder="Nhập mật khẩu...">
            </div>
            <div class="input-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" required placeholder="Nhập lại mật khẩu...">
            </div>
            <button type="submit" class="submit-btn">TẠO TÀI KHOẢN</button>
            <div id="message"></div>
        </form>
        <div class="switch-page">
            Đã có tài khoản? <a href="dangnhap.html">Đăng nhập ngay</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('message');

            // Kiểm tra mật khẩu khớp nhau
            if (password !== confirmPassword) {
                msg.style.color = '#ff4655';
                msg.innerText = '❌ Mật khẩu xác nhận không khớp!';
                return;
            }

            try {
                msg.style.color = '#888';
                msg.innerText = '⏳ Đang xử lý...';

                const res = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msg.style.color = '#00ff00';
                    msg.innerText = '✅ Đăng ký thành công! Đang chuyển hướng...';
                    setTimeout(() => window.location.href = 'dangnhap.html', 1500); 
                } else {
                    msg.style.color = '#ff4655';
                    msg.innerText = `❌ ${data.message}`;
                }
            } catch (error) {
                msg.style.color = '#ff4655';
                msg.innerText = '❌ Lỗi kết nối tới Server!';
            }
        });
    </script>
</body>
</html>
