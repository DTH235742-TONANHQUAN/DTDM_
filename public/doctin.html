<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đọc Tin - Q-Esport</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container" style="max-width: 1000px;">
        <a href="index.html" class="back-btn">⬅ Quay lại Trang chủ</a>
        
        <article class="article-detail-container" id="articleDetail">
            <h2 style="text-align: center; color: #888;">⏳ Đang tải nội dung bài viết...</h2>
        </article>

        <div class="comments-section" style="margin-top: 50px; padding-top: 30px; border-top: 2px solid #2a2e35;">
            <h3 style="color: #fff; margin-bottom: 25px; font-size: 1.5rem;">💬 Bình luận (<span id="commentCount">0</span>)</h3>
            
            <div id="commentFormContainer" style="margin-bottom: 30px;"></div>

            <div id="commentsList" style="display: flex; flex-direction: column; gap: 15px;"></div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
</body>
</html>
