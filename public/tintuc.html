<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tất cả tin tức - Q-Esport</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="container">
        <h2 style="color: #fff; border-left: 4px solid #5d4369; padding-left: 10px; margin-bottom: 30px; font-size: 1.8rem; text-transform: uppercase;">Kho lưu trữ tin tức</h2>

        <div style="text-align: center; margin-bottom: 25px;">
            <input type="text" id="homeSearchInput" placeholder="🔍 Tìm kiếm trong kho tin tức..." 
                   style="width: 100%; max-width: 600px; padding: 12px 25px; border-radius: 30px; border: 2px solid #333; background-color: #1a1e24; color: white; outline: none;">
        </div>

        <div class="filter-container" id="filter-buttons" style="margin-bottom: 40px;">
            <button class="filter-btn active" data-category="Tất cả">Tất cả</button>
            <button class="filter-btn" data-category="LOL">LOL</button>
            <button class="filter-btn" data-category="TFT">TFT</button>
            <button class="filter-btn" data-category="CS2">CS:GO 2</button>
            <button class="filter-btn" data-category="Valorant">Valorant</button>
            <button class="filter-btn" data-category="PUBG">PUBG</button>
        </div>

        <div id="news-container" class="news-grid-full">
            </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>
</html>
