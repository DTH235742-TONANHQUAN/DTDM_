<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Trang Tin E-Sport</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f1923; color: #ece8e1; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .auth-container { background-color: #1f2326; padding: 40px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 100%; max-width: 400px; text-align: center; }
        .auth-container h2 { color: #fff; margin-bottom: 25px; font-size: 2rem; text-transform: uppercase; }
        .auth-container h2 span { color: #5d4369; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #aaa; font-weight: bold; font-size: 0.9rem; }
        .input-group input[type="text"], .input-group input[type="password"] { width: 100%; padding: 12px; background-color: #0f1923; border: 1px solid #333; color: white; border-radius: 4px; outline: none; transition: 0.3s; }
        .input-group input[type="text"]:focus, .input-group input[type="password"]:focus { border-color: #5d4369; box-shadow: 0 0 8px rgba(93, 67, 105, 0.5); }
        
        /* CSS cho Checkbox hiện mật khẩu */
        .checkbox-group { text-align: left; margin-bottom: 20px; display: flex; align-items: center; }
        .checkbox-group input { margin-right: 8px; cursor: pointer; accent-color: #5d4369; width: 16px; height: 16px; }
        .checkbox-group label { color: #aaa; font-size: 0.9rem; cursor: pointer; user-select: none; }

        .submit-btn { width: 100%; padding: 12px; background-color: #5d4369; color: white; border: none; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #4a3554; box-shadow: 0 0 15px rgba(93, 67, 105, 0.6); }
        
        .switch-page { margin-top: 20px; font-size: 0.9rem; color: #888; }
        .switch-page a { color: #5d4369; text-decoration: none; font-weight: bold; }
        .switch-page a:hover { color: #fff; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Đăng <span>Nhập</span></h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" required placeholder="Nhập tên tài khoản...">
            </div>
            <div class="input-group" style="margin-bottom: 10px;">
                <label>Mật khẩu</label>
                <input type="password" id="password" required placeholder="Nhập mật khẩu...">
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="showPassword">
                <label for="showPassword">Hiển thị mật khẩu</label>
            </div>

            <button type="submit" class="submit-btn">VÀO TRANG</button>
            <div id="message"></div>
        </form>
        <div class="switch-page">
            Chưa có tài khoản? <a href="dangky.html">Tạo tài khoản mới</a>
        </div>
    </div>

    <script>
        // Logic để ẩn/hiện mật khẩu
        document.getElementById('showPassword').addEventListener('change', function() {
            const pwdInput = document.getElementById('password');
            if (this.checked) {
                pwdInput.type = 'text'; // Hiện mật khẩu
            } else {
                pwdInput.type = 'password'; // Ẩn mật khẩu
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            try {
                msg.style.color = '#888';
                msg.innerText = '⏳ Đang đăng nhập...';

                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msg.style.color = '#00ff00';
                    msg.innerText = '✅ Đăng nhập thành công!';
                    localStorage.setItem('esport_user', JSON.stringify(data.user));
                    setTimeout(() => window.location.href = 'index.html', 1000); 
                } else {
                    msg.style.color = '#ff4655';
                    msg.innerText = `❌ ${data.message}`;
                }
            } catch (error) {
                msg.style.color = '#ff4655';
                msg.innerText = '❌ Lỗi kết nối tới Server!';
            }
        });
    </script>
</body>
</html>
